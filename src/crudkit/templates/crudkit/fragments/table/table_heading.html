{% spaceless %}
<th
        scope="col"
        class="sticky top-0 z-10 whitespace-nowrap px-2 py-3 text-left text-sm font-semibold text-gray-900
        border-b border-gray-300 bg-white bg-opacity-75
        backdrop-blur backdrop-filter
        {% if not first_column %}hidden lg:table-cell{% endif %}
        {{ extra_css }}">{{ text }}</th>
{% endspaceless %}
