<div class="mb-3 flex items-center">
  <button type="button"
          class="toggle relative inline-flex h-6 w-11 flex-shrink-0 rounded-full border-2 border-transparent cursor-not-allowed{% if value %} checked{% endif %}"
          role="switch" aria-checked="{{ value|lower }}"
          disabled
          aria-disabled="true"
  >
  <span class="sr-only">{{ label|safe }}</span>
  <span aria-hidden="true"
        class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0{% if value %} translate-x-5{% else %} translate-x-0{% endif %}"></span>
  </button>
  <label
    class="mt-2 ml-4 block text-gray-500 text-md font-medium mb-2 inline-block col-form-label">{{ label|safe }}</label>
</div>
