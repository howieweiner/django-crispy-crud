name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv run --extra dev ruff check src/ tests/
      - run: uv run --extra dev ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv run --extra dev --python ${{ matrix.python-version }} pytest

  css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install tailwindcss@^4.1 @tailwindcss/cli@^4.1
      - run: uv run --extra dev python manage.py crispy_crud_css --relative-to tests/testapp/static_src/styles.css >> tests/testapp/static_src/styles.css
      - run: npx @tailwindcss/cli -i tests/testapp/static_src/styles.css -o /tmp/out.css
      - name: Assert compiled CSS has crispy-crud utilities, both @source paths, and the theming override
        run: |
          grep -q '\.btn-primary' /tmp/out.css || { echo "FAIL: .btn-primary missing (crispy-crud entry CSS utilities)"; exit 1; }
          grep -q 'animate-spin' /tmp/out.css || { echo "FAIL: animate-spin missing (crispy-crud's own @source)"; exit 1; }
          grep -q '\.fill-current' /tmp/out.css || { echo "FAIL: .fill-current missing (crispy-tailwind's @source)"; exit 1; }
          grep -q -- '--crud-btn-primary-bg:' /tmp/out.css || { echo "FAIL: --crud-btn-primary-bg override missing"; exit 1; }
